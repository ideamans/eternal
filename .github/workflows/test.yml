name: Test

on:
  push:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build web UI
        run: cd web && npm ci && npm run build

      - name: Copy web dist
        run: cp -r web/dist cmd/et/dist

      - run: go test ./...
